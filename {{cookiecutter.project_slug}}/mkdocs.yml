site_name: {{ cookiecutter.project_name }}
site_description: {{ cookiecutter.project_description }}
repo_url: https://github.com/{{ cookiecutter.github_user }}/{{ cookiecutter.project_slug }}
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
    - scheme: slate
      primary: indigo
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.tabs
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Training: training.md
  - Serving: serving.md
  - API reference: api.md
