name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install deps
        run: uv sync --all-groups
      - name: Ruff check
        run: uv run --all-groups ruff check .
      - name: Ruff format
        run: uv run --all-groups ruff format --check .
      - name: Mypy
        run: uv run --all-groups mypy src scripts
      - name: Deptry
        run: uv run --all-groups deptry .
      - name: Bandit
        run: uv run --all-groups bandit -r src scripts -c pyproject.toml
      - name: Interrogate
        run: uv run --all-groups interrogate -c pyproject.toml src scripts
      - name: Pytest
        run: uv run --all-groups pytest
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          fail_level: error

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build training image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: training
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build serving image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: serving
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
