stages:
  prepare:
    cmd: python -m {{ cookiecutter.package_name }}.data.prepare --raw data/raw --out data/processed
    deps:
      - data/raw
      - src/{{ cookiecutter.package_name }}/data/prepare.py
    outs:
      - data/processed
  train:
    cmd: python -m {{ cookiecutter.package_name }}.training.train
    deps:
      - data/processed
      - src/{{ cookiecutter.package_name }}
      - configs
    params:
      - params.yaml:
    outs:
      - artifacts/checkpoints
    metrics:
      - reports/metrics.json:
          cache: false
