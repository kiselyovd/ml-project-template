services:
{% if cookiecutter.has_serving == "true" -%}
  api:
    build:
      context: .
      target: serving
    image: {{ cookiecutter.project_slug }}-serving:local
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/models:ro
    environment:
      MODEL_PATH: /models/best.ckpt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
{% endif -%}

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --backend-store-uri /mlruns --default-artifact-root /mlruns

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - monitoring
